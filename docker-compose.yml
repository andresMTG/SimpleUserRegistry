services:
  db:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_NAME: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./configs/database/migrations:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

  app:
    build: .
    env_file:
    - .env
    depends_on:
      - db
    environment:
      DB_SOURCE: "${DB_USER}:${DB_PASSWORD}@tcp(db:3306)/${DB_NAME}?parseTime=true"
    ports:
      - "8080:8080"

volumes:
  mysql_data: